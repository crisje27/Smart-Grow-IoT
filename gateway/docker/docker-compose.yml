# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                    SMART GROW - Docker Compose Stack                          ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝
#
# Uso:
#   docker compose up -d          # Iniciar todos los servicios
#   docker compose ps             # Ver estado
#   docker compose logs -f        # Ver logs
#   docker compose down           # Detener

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # INFLUXDB - Base de datos time-series
  # ═══════════════════════════════════════════════════════════════════════════
  influxdb:
    image: influxdb:2.7
    container_name: smartgrow-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=smartgrow2025
      - DOCKER_INFLUXDB_INIT_ORG=smartgrow
      - DOCKER_INFLUXDB_INIT_BUCKET=agricola
      - DOCKER_INFLUXDB_INIT_RETENTION=90d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN:-smartgrow-token-change-me}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - smartgrow-net

  # ═══════════════════════════════════════════════════════════════════════════
  # MOSQUITTO - Broker MQTT
  # ═══════════════════════════════════════════════════════════════════════════
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartgrow-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ../config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - smartgrow-net

  # ═══════════════════════════════════════════════════════════════════════════
  # FASTAPI - Backend REST API + Machine Learning
  # ═══════════════════════════════════════════════════════════════════════════
  fastapi:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: smartgrow-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../../ml-models/models:/app/ml_models:ro
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN:-smartgrow-token-change-me}
      - INFLUX_ORG=smartgrow
      - INFLUX_BUCKET=agricola
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    depends_on:
      - influxdb
      - mosquitto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - smartgrow-net

  # ═══════════════════════════════════════════════════════════════════════════
  # GRAFANA - Dashboards técnicos
  # ═══════════════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: smartgrow-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=smartgrow2025
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
    depends_on:
      - influxdb
    networks:
      - smartgrow-net

  # ═══════════════════════════════════════════════════════════════════════════
  # NODE-RED - Automatización y flujos
  # ═══════════════════════════════════════════════════════════════════════════
  nodered:
    image: nodered/node-red:latest
    container_name: smartgrow-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    environment:
      - TZ=America/Argentina/Tucuman
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - smartgrow-net

  # ═══════════════════════════════════════════════════════════════════════════
  # FRONTEND - PWA Vue.js
  # ═══════════════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: smartgrow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - fastapi
    networks:
      - smartgrow-net

# ═══════════════════════════════════════════════════════════════════════════
# VOLÚMENES PERSISTENTES
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  influxdb_data:
    name: smartgrow_influxdb_data
  influxdb_config:
    name: smartgrow_influxdb_config
  mosquitto_data:
    name: smartgrow_mosquitto_data
  mosquitto_log:
    name: smartgrow_mosquitto_log
  grafana_data:
    name: smartgrow_grafana_data
  nodered_data:
    name: smartgrow_nodered_data

# ═══════════════════════════════════════════════════════════════════════════
# RED INTERNA
# ═══════════════════════════════════════════════════════════════════════════
networks:
  smartgrow-net:
    name: smartgrow-network
    driver: bridge
