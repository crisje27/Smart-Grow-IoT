# SMART GROW - Mosquitto MQTT Broker Configuration
# ================================================

# Listener principal (sin autenticación para red local)
listener 1883
allow_anonymous true

# Listener WebSocket (para clientes web)
listener 9001
protocol websockets
allow_anonymous true

# Persistencia
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Conexiones
max_connections -1
